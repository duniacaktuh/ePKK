<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ePKK - Keanggotaan Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        
        /* Print Styles */
        @media print {
            body { background-color: white; }
            #sidebar, header, .no-print { display: none !important; }
            #main-content { margin: 0; padding: 0; width: 100%; }
            .print-area { width: 100%; }
            @page { size: A4; margin: 10mm; }
            .print-table th { background-color: #f3f4f6 !important; -webkit-print-color-adjust: exact; }
            .page-break { page-break-before: always; }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .modal { display: none; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-teal-700 text-white w-64 flex-shrink-0 flex flex-col transition-all duration-300 md:relative absolute z-20 h-full -translate-x-full md:translate-x-0">
        <div class="p-5 flex items-center justify-between border-b border-teal-600">
            <h1 class="text-2xl font-bold tracking-wider"><i class="fa-solid fa-leaf mr-2"></i> ePKK</h1>
            <button onclick="toggleSidebar()" class="md:hidden text-white"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 overflow-y-auto py-4">
            <ul class="space-y-1">
                <li><a href="#" onclick="switchMenu('dashboard')" class="nav-link block py-3 px-5 hover:bg-teal-600 transition bg-teal-800" data-menu="dashboard"><i class="fa-solid fa-chart-pie w-6"></i> Dashboard</a></li>
                <li><a href="#" onclick="switchMenu('anggota')" class="nav-link block py-3 px-5 hover:bg-teal-600 transition" data-menu="anggota"><i class="fa-solid fa-users w-6"></i> Catat Data Anggota</a></li>
                <li><a href="#" onclick="switchMenu('kecamatan')" class="nav-link block py-3 px-5 hover:bg-teal-600 transition" data-menu="kecamatan"><i class="fa-solid fa-building w-6"></i> Data Kecamatan</a></li>
                <li><a href="#" onclick="switchMenu('kelurahan')" class="nav-link block py-3 px-5 hover:bg-teal-600 transition" data-menu="kelurahan"><i class="fa-solid fa-map-location-dot w-6"></i> Data Kelurahan</a></li>
                <li><a href="#" onclick="switchMenu('birthday')" class="nav-link block py-3 px-5 hover:bg-teal-600 transition" data-menu="birthday"><i class="fa-solid fa-cake-candles w-6"></i> Birthday</a></li>
                <li><a href="#" onclick="switchMenu('rekap')" class="nav-link block py-3 px-5 hover:bg-teal-600 transition" data-menu="rekap"><i class="fa-solid fa-file-lines w-6"></i> Rekap Data</a></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-teal-600 text-xs text-center text-teal-200">
            &copy; 2026 ePKK Digital
        </div>
    </aside>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Header -->
        <header class="bg-white shadow-sm h-16 flex items-center justify-between px-4 lg:px-6 z-10">
            <div class="flex items-center">
                <button onclick="toggleSidebar()" class="md:hidden mr-4 text-gray-600 hover:text-teal-700"><i class="fa-solid fa-bars text-xl"></i></button>
                <h2 id="page-title" class="text-xl font-semibold text-gray-800">Dashboard</h2>
            </div>
            <div class="flex items-center space-x-4">
                <span id="sync-status" class="text-xs text-gray-500 hidden md:inline-block">Local Mode</span>
                <button onclick="syncData()" class="text-gray-500 hover:text-teal-600 transition tooltip" title="Sinkronisasi Spreadsheet">
                    <i class="fa-solid fa-arrows-rotate text-lg" id="sync-icon"></i>
                </button>
                <button onclick="openSettings()" class="text-gray-500 hover:text-teal-600 transition tooltip" title="Pengaturan Spreadsheet">
                    <i class="fa-solid fa-gear text-lg"></i>
                </button>
                <div class="w-8 h-8 rounded-full bg-teal-100 flex items-center justify-center text-teal-700 font-bold border border-teal-300">
                    AD
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <div id="content-area" class="flex-1 overflow-y-auto p-4 lg:p-6 pb-20">
            <!-- Content will be injected here via JS -->
        </div>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md mx-4">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="text-lg font-semibold text-gray-800"><i class="fa-solid fa-gear mr-2"></i> Pengaturan Aplikasi</h3>
                <button onclick="closeSettings()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Google Web App URL</label>
                    <input type="text" id="setting-url" class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-teal-500" placeholder="https://script.google.com/macros/s/...">
                    <p class="text-xs text-gray-500 mt-1">Masukkan URL dari Google Apps Script untuk integrasi Spreadsheet.</p>
                </div>
            </div>
            <div class="bg-gray-50 p-4 border-t flex justify-end space-x-2 rounded-b-lg">
                <button onclick="closeSettings()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md text-sm hover:bg-gray-300">Batal</button>
                <button onclick="saveSettings()" class="px-4 py-2 bg-teal-600 text-white rounded-md text-sm hover:bg-teal-700"><i class="fa-solid fa-save mr-1"></i> Simpan URL</button>
            </div>
        </div>
    </div>

    <!-- Form Modal Universal -->
    <div id="form-modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-3xl max-h-[90vh] flex flex-col">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 id="form-title" class="text-lg font-semibold text-gray-800">Form</h3>
                <button onclick="closeForm()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4 overflow-y-auto flex-1" id="form-body">
                <!-- Form fields injected here -->
            </div>
            <div class="bg-gray-50 p-4 border-t flex justify-end space-x-2 rounded-b-lg">
                <button onclick="closeForm()" class="px-4 py-2 bg-white border border-gray-300 text-gray-800 rounded-md text-sm hover:bg-gray-50"><i class="fa-solid fa-xmark mr-1"></i> Batal</button>
                <button onclick="submitForm()" class="px-4 py-2 bg-teal-600 text-white rounded-md text-sm hover:bg-teal-700"><i class="fa-solid fa-save mr-1"></i> Simpan Data</button>
            </div>
        </div>
    </div>

    <!-- View Modal Universal -->
    <div id="view-modal" class="modal fixed inset-0 bg-black bg-opacity-50 z-50 items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-lg">
            <div class="flex justify-between items-center p-4 border-b">
                <h3 class="text-lg font-semibold text-gray-800"><i class="fa-solid fa-eye mr-2"></i> Detail Data</h3>
                <button onclick="closeViewModal()" class="text-gray-500 hover:text-red-500"><i class="fa-solid fa-times"></i></button>
            </div>
            <div class="p-4" id="view-body">
                <!-- Details injected here -->
            </div>
            <div class="bg-gray-50 p-4 border-t flex justify-end rounded-b-lg">
                <button onclick="closeViewModal()" class="px-4 py-2 bg-gray-200 text-gray-800 rounded-md text-sm hover:bg-gray-300">Tutup</button>
            </div>
        </div>
    </div>

<script>
    // --- DATABASE & STATE ---
    let db = {
        anggota: [],
        kecamatan: [],
        kelurahan: []
    };
    
    let currentMenu = 'dashboard';
    let currentFormType = '';
    let editId = null;
    let webAppUrl = localStorage.getItem('epkk_url') || '';
    
    const monthsIndo = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

    // Initialize Mock Data if empty
    function initMockData() {
        if(localStorage.getItem('epkk_data')) {
            db = JSON.parse(localStorage.getItem('epkk_data'));
        } else {
            db.anggota = [
                { id: "A12BC34D", nama: "Ibu Ratna Sari", jabatan: "Ketua", tglLahir: "1980-04-12", alamat: "Jl. Mawar No 1", status: "Pengurus", warta: "Warta A", agama: "Islam", hp: "+628123456789" },
                { id: "B98LK76M", nama: "Drs. Budi Santoso", jabatan: "Anggota", tglLahir: "1975-08-20", alamat: "Jl. Melati 2", status: "Staf", warta: "Warta B", agama: "Kristen", hp: "+628987654321" }
            ];
            db.kecamatan = [
                { id: "KUBE123", kecamatan: "Gubeng", namaPejabat: "Drs. Heri", lp: "L", ketuaPkkId: "A12BC34D", sekretaris: "Ibu Lina", hpSekretaris: "+628111222333" }
            ];
            db.kelurahan = [
                { id: "AIR4567", kelurahan: "Airlangga", namaPejabat: "Ibu Diana", lp: "P", ketuaPkkId: "A12BC34D", sekretaris: "Bapak Tono", hpSekretaris: "+628444555666" }
            ];
            saveLocalDb();
        }
        updateSyncStatus();
    }

    function saveLocalDb() {
        localStorage.setItem('epkk_data', JSON.stringify(db));
    }

    // --- MAPPING DATA SPREADSHEET (SOLUSI UNDEFINED & NAN) ---
    // Fungsi ini akan mencocokkan data dari Spreadsheet walaupun Headernya kapital, ber spasi, dsb.
    function mapData(rawArray, type) {
        if (!rawArray || !Array.isArray(rawArray)) return [];
        return rawArray.map(item => {
            let lowerKeys = {};
            // Ubah semua key jadi huruf kecil & buang spasi agar mudah dimapping
            Object.keys(item).forEach(k => {
                lowerKeys[k.toLowerCase().replace(/[^a-z0-9]/g, '')] = item[k];
            });

            if (type === 'anggota') {
                let dateVal = lowerKeys.tgllahir || lowerKeys.tanggallahir || item.tglLahir || '';
                // Pastikan format tanggal sesuai ISO untuk Date Picker HTML
                if(dateVal && !isNaN(new Date(dateVal).getTime())) {
                    dateVal = new Date(dateVal).toISOString().split('T')[0];
                }
                return {
                    id: lowerKeys.id || item.id || '',
                    nama: lowerKeys.nama || lowerKeys.namapengurus || item.nama || '',
                    jabatan: lowerKeys.jabatan || item.jabatan || '',
                    tglLahir: dateVal,
                    alamat: lowerKeys.alamat || lowerKeys.alamatdomisili || item.alamat || '',
                    status: lowerKeys.status || item.status || '',
                    agama: lowerKeys.agama || item.agama || '',
                    warta: lowerKeys.warta || item.warta || '',
                    hp: lowerKeys.hp || lowerKeys.nohp || item.hp || ''
                };
            } else if (type === 'kecamatan') {
                 return {
                    id: lowerKeys.id || item.id || '',
                    kecamatan: lowerKeys.kecamatan || lowerKeys.wilayah || item.kecamatan || '',
                    namaPejabat: lowerKeys.namapejabat || item.namaPejabat || '',
                    lp: lowerKeys.lp || lowerKeys.jeniskelamin || item.lp || '',
                    ketuaPkkId: lowerKeys.ketuapkkid || lowerKeys.ketuapkk || item.ketuaPkkId || '',
                    sekretaris: lowerKeys.sekretaris || item.sekretaris || '',
                    hpSekretaris: lowerKeys.hpsekretaris || item.hpSekretaris || ''
                 };
            } else if (type === 'kelurahan') {
                 return {
                    id: lowerKeys.id || item.id || '',
                    kelurahan: lowerKeys.kelurahan || lowerKeys.wilayah || item.kelurahan || '',
                    namaPejabat: lowerKeys.namapejabat || item.namaPejabat || '',
                    lp: lowerKeys.lp || lowerKeys.jeniskelamin || item.lp || '',
                    ketuaPkkId: lowerKeys.ketuapkkid || lowerKeys.ketuapkk || item.ketuaPkkId || '',
                    sekretaris: lowerKeys.sekretaris || item.sekretaris || '',
                    hpSekretaris: lowerKeys.hpsekretaris || item.hpSekretaris || ''
                 };
            }
            return item;
        });
    }

    // --- UTILITIES ---
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        sidebar.classList.toggle('-translate-x-full');
    }

    function switchMenu(menu) {
        currentMenu = menu;
        document.querySelectorAll('.nav-link').forEach(el => {
            el.classList.remove('bg-teal-800');
            if(el.dataset.menu === menu) el.classList.add('bg-teal-800');
        });
        
        const titles = {
            'dashboard': 'Dashboard',
            'anggota': 'Data Anggota',
            'kecamatan': 'Data Kecamatan',
            'kelurahan': 'Data Kelurahan',
            'birthday': 'Birthday',
            'rekap': 'Rekapitulasi Data'
        };
        document.getElementById('page-title').innerText = titles[menu];
        if(window.innerWidth < 768) toggleSidebar();
        
        renderContent();
    }

    function calculateAge(birthDateStr) {
        if(!birthDateStr) return 0;
        const today = new Date();
        const birthDate = new Date(birthDateStr);
        if (isNaN(birthDate.getTime())) return 0;
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
            age--;
        }
        return age;
    }

    function formatDateIndo(dateStr) {
        if(!dateStr) return "-";
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return `${d.getDate()} ${monthsIndo[d.getMonth()]} ${d.getFullYear()}`;
    }

    function generateId(type) {
        const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numbers = '0123456789';
        const getRand = (str, len) => Array.from({length: len}, () => str[Math.floor(Math.random() * str.length)]).join('');
        
        if(type === 'anggota') {
            const alphanum = letters + numbers;
            return getRand(letters, 1) + getRand(alphanum, 8);
        } else if (type === 'kecamatan') {
            return getRand(letters, 4) + getRand(numbers, 3);
        } else if (type === 'kelurahan') {
            return getRand(letters, 3) + getRand(numbers, 4);
        }
    }

    function showNotification(msg, type='success') {
        const color = type === 'success' ? 'bg-teal-600' : 'bg-red-500';
        const notif = document.createElement('div');
        notif.className = `fixed bottom-4 right-4 ${color} text-white px-6 py-3 rounded shadow-lg z-50 transform transition-transform duration-300 translate-y-0`;
        notif.innerHTML = `<i class="fa-solid fa-circle-info mr-2"></i> ${msg}`;
        document.body.appendChild(notif);
        setTimeout(() => {
            notif.classList.add('translate-y-20', 'opacity-0');
            setTimeout(() => notif.remove(), 300);
        }, 3000);
    }

    // --- SPREADSHEET SYNC LOGIC ---
    function updateSyncStatus() {
        const status = document.getElementById('sync-status');
        if(webAppUrl) {
            status.innerText = "Tersambung Spreadsheet";
            status.className = "text-xs text-teal-600 font-medium hidden md:inline-block bg-teal-100 px-2 py-1 rounded";
        } else {
            status.innerText = "Mode Lokal";
            status.className = "text-xs text-gray-500 hidden md:inline-block bg-gray-200 px-2 py-1 rounded";
        }
    }

    async function syncData() {
        if(!webAppUrl) {
            showNotification("URL Web App belum diatur. Menyimpan di memori lokal.", "error");
            return;
        }
        const icon = document.getElementById('sync-icon');
        icon.classList.add('animate-spin');
        
        try {
            // Ditambahkan redirect: 'follow' untuk menghindari masalah request CORS/redirect dari App Script
            const response = await fetch(webAppUrl + '?action=getData', {
                method: 'GET',
                redirect: 'follow' 
            });
            
            if(response.ok) {
                const data = await response.json();
                
                // Panggil mapData untuk mengatasi "undefined" jika format header di spreadsheet beda
                db.anggota = mapData(data.anggota || [], 'anggota');
                db.kecamatan = mapData(data.kecamatan || [], 'kecamatan');
                db.kelurahan = mapData(data.kelurahan || [], 'kelurahan');
                
                saveLocalDb();
                renderContent(); // Render ulang dengan data tersinkron
                showNotification("Sinkronisasi otomatis berhasil!");
            } else {
                throw new Error("Gagal mengambil data dari Spreadsheet");
            }
        } catch (error) {
            console.error("Kesalahan Sinkronisasi:", error);
            showNotification("Gagal sinkronisasi. Pastikan URL valid dan Apps Script bisa diakses.", "error");
        } finally {
            icon.classList.remove('animate-spin');
        }
    }

    async function pushToSpreadsheet(action, table, data) {
        if(!webAppUrl) return; 
        
        try {
            fetch(webAppUrl, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: action, table: table, data: data })
            });
        } catch (e) {
            console.log("Error push to GS", e);
        }
    }

    // --- RENDERERS ---
    function renderContent() {
        const area = document.getElementById('content-area');
        area.innerHTML = '';
        
        switch(currentMenu) {
            case 'dashboard': renderDashboard(area); break;
            case 'anggota': renderAnggota(area); break;
            case 'kecamatan': renderKecamatan(area); break;
            case 'kelurahan': renderKelurahan(area); break;
            case 'birthday': renderBirthday(area); break;
            case 'rekap': renderRekap(area); break;
        }
    }

    function renderDashboard(area) {
        const ttlKota = db.anggota.filter(a => a.status === 'Pengurus').length;
        const ttlStaf = db.anggota.filter(a => a.status === 'Staf').length;
        const ttlKec = db.kecamatan.length;
        const ttlKel = db.kelurahan.length;
        
        // Agama Stats
        const agamaCount = {};
        db.anggota.forEach(a => { 
            const agm = a.agama || "Lainnya";
            agamaCount[agm] = (agamaCount[agm] || 0) + 1; 
        });
        
        // Birthdays this month
        const currentMonth = new Date().getMonth();
        const bdays = db.anggota.filter(a => a.tglLahir && new Date(a.tglLahir).getMonth() === currentMonth).slice(0,5);

        let html = `
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-teal-500 flex items-center justify-between">
                    <div><p class="text-sm text-gray-500">Pengurus Kota</p><p class="text-2xl font-bold text-gray-800">${ttlKota}</p></div>
                    <div class="w-12 h-12 bg-teal-100 rounded-full flex items-center justify-center text-teal-600 text-xl"><i class="fa-solid fa-users"></i></div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-blue-500 flex items-center justify-between">
                    <div><p class="text-sm text-gray-500">Staf</p><p class="text-2xl font-bold text-gray-800">${ttlStaf}</p></div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 text-xl"><i class="fa-solid fa-id-badge"></i></div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-yellow-500 flex items-center justify-between">
                    <div><p class="text-sm text-gray-500">Kecamatan</p><p class="text-2xl font-bold text-gray-800">${ttlKec}</p></div>
                    <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center text-yellow-600 text-xl"><i class="fa-solid fa-building"></i></div>
                </div>
                <div class="bg-white p-4 rounded-lg shadow border-l-4 border-pink-500 flex items-center justify-between">
                    <div><p class="text-sm text-gray-500">Kelurahan</p><p class="text-2xl font-bold text-gray-800">${ttlKel}</p></div>
                    <div class="w-12 h-12 bg-pink-100 rounded-full flex items-center justify-center text-pink-600 text-xl"><i class="fa-solid fa-map-location-dot"></i></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="bg-white p-5 rounded-lg shadow">
                    <h3 class="text-lg font-semibold mb-4 text-gray-800 border-b pb-2">Statistik Agama</h3>
                    <ul class="space-y-3">
                        ${Object.keys(agamaCount).length > 0 ? Object.entries(agamaCount).map(([agama, count]) => `
                            <li>
                                <div class="flex justify-between mb-1"><span class="text-sm font-medium text-gray-700">${agama}</span><span class="text-sm text-gray-500">${count}</span></div>
                                <div class="w-full bg-gray-200 rounded-full h-2">
                                    <div class="bg-teal-500 h-2 rounded-full" style="width: ${(count/db.anggota.length)*100}%"></div>
                                </div>
                            </li>
                        `).join('') : '<p class="text-sm text-gray-500">Belum ada data.</p>'}
                    </ul>
                </div>

                <div class="bg-white p-5 rounded-lg shadow">
                    <div class="flex justify-between items-center mb-4 border-b pb-2">
                        <h3 class="text-lg font-semibold text-gray-800">Ulang Tahun Bulan Ini</h3>
                        <button onclick="switchMenu('birthday')" class="text-sm text-teal-600 hover:underline">Lihat Semua</button>
                    </div>
                    <ul class="divide-y divide-gray-100">
                        ${bdays.length > 0 ? bdays.map(b => `
                            <li class="py-3 flex items-center justify-between">
                                <div class="flex items-center">
                                    <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 flex items-center justify-center mr-3 font-bold"><i class="fa-solid fa-cake-candles"></i></div>
                                    <div>
                                        <p class="text-sm font-medium text-gray-800">${b.nama || '-'}</p>
                                        <p class="text-xs text-gray-500">${b.jabatan || '-'} • ${new Date(b.tglLahir).getDate()} ${monthsIndo[new Date(b.tglLahir).getMonth()]}</p>
                                    </div>
                                </div>
                                <span class="bg-teal-100 text-teal-800 text-xs px-2 py-1 rounded-full">${calculateAge(b.tglLahir)} thn</span>
                            </li>
                        `).join('') : '<li class="py-3 text-sm text-gray-500">Tidak ada yang berulang tahun bulan ini.</li>'}
                    </ul>
                </div>
            </div>
        `;
        area.innerHTML = html;
    }

    function renderAnggota(area) {
        let html = `

    function buildRatioBar(dataArray, label) {
        const total = dataArray.length;
        const lCount = dataArray.filter(d => d.lp === 'L' || d.lp === 'l').length;
        const pCount = dataArray.filter(d => d.lp === 'P' || d.lp === 'p').length;
        const lPct = total === 0 ? 0 : Math.round((lCount / total) * 100);
        const pPct = total === 0 ? 0 : 100 - lPct;

        const barColor = label === 'Kecamatan' ? 'bg-blue-500' : 'bg-pink-500';

        return `
            <div class="bg-white p-4 rounded-lg shadow mb-4 border border-gray-100">
                <p class="text-sm font-medium text-gray-700 mb-2">Rasio Pejabat ${label} (L/P)</p>
                <div class="w-full bg-gray-200 rounded-full h-5 flex overflow-hidden mb-1 relative">
                    <div class="${barColor} h-5 flex items-center pl-2 text-xs text-white font-medium" style="width: ${lPct}%">${lPct > 0 ? lPct+'%' : ''}</div>
                    ${pPct > 0 && lPct === 0 ? `<div class="${barColor} h-5 w-full flex items-center justify-center text-xs text-white font-medium">100%</div>` : ''}
                </div>
                <div class="flex justify-between text-xs text-gray-500">
                    <span><i class="fa-solid fa-person text-blue-500 mr-1"></i> Laki-laki: ${lCount}</span>
                    <span>Perempuan: ${pCount} <i class="fa-solid fa-person-dress text-pink-500 ml-1"></i></span>
                </div>
            </div>
        `;
    }

                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Nama ${labelWilayah} <span class="text-red-500">*</span></label>
                        <input type="text" id="f_wilayah" value="${data ? (data.kecamatan || data.kelurahan) : ''}" class="w-full border rounded p-2 text-sm" required>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Nama Pejabat</label>
                        <input type="text" id="f_pejabat" value="${data && data.namaPejabat ? data.namaPejabat : ''}" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Jenis Kelamin Pejabat (L/P)</label>
                        <select id="f_lp" class="w-full border rounded p-2 text-sm">
                            <option value="L" ${data && data.lp=='L'?'selected':''}>Laki-laki (L)</option>
                            <option value="P" ${data && data.lp=='P'?'selected':''}>Perempuan (P)</option>
                        </select>
                    </div>
                    <div class="md:col-span-2 border-t pt-2 mt-2">
                        <label class="block text-xs font-semibold text-teal-700 mb-2">Integrasi Data Anggota</label>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Ketua TP PKK</label>
                        <select id="f_ketua" class="w-full border rounded p-2 text-sm" onchange="document.getElementById('f_warta').value = this.options[this.selectedIndex].dataset.warta || '-'">
                            <option value="">-- Pilih Ketua --</option>
                            ${ketuaOptions}
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Warta (Otomatis)</label>
                        <input type="text" id="f_warta" value="${data ? (db.anggota.find(a=>a.id==data.ketuaPkkId)?.warta || '-') : '-'}" readonly class="w-full border rounded p-2 bg-gray-100 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">Nama Sekretaris</label>
                        <input type="text" id="f_sekretaris" value="${data && data.sekretaris ? data.sekretaris : ''}" class="w-full border rounded p-2 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs text-gray-500">HP Sekretaris</label>
                        <input type="text" id="f_hpsekretaris" value="${data && data.hpSekretaris ? data.hpSekretaris : '+62'}" oninput="if(!this.value.startsWith('+62')) this.value='+62';" class="w-full border rounded p-2 text-sm">
                    </div>
                </div>
            `;
        }
    }

    function closeForm() {
        document.getElementById('form-modal').classList.remove('active');
    }

    function submitForm() {
        const type = currentFormType;
        let newData = {};

        if(type === 'anggota') {
            const nama = document.getElementById('f_nama').value;
            const tglLahir = document.getElementById('f_tglLahir').value;
            if(!nama || !tglLahir) return alert('Nama dan Tanggal Lahir wajib diisi!');
            
            newData = {
                id: document.getElementById('f_id').value,
                nama: nama,
                jabatan: document.getElementById('f_jabatan').value,
                tglLahir: tglLahir,
                alamat: document.getElementById('f_alamat').value,
                status: document.getElementById('f_status').value,
                agama: document.getElementById('f_agama').value,
                warta: document.getElementById('f_warta').value,
                hp: document.getElementById('f_hp').value
            };
        } else if (type === 'kecamatan' || type === 'kelurahan') {
            const wilayah = document.getElementById('f_wilayah').value;
            if(!wilayah) return alert(`Nama ${type} wajib diisi!`);

            newData = {
                id: document.getElementById('f_id').value,
                namaPejabat: document.getElementById('f_pejabat').value,
                lp: document.getElementById('f_lp').value,
                ketuaPkkId: document.getElementById('f_ketua').value,
                sekretaris: document.getElementById('f_sekretaris').value,
                hpSekretaris: document.getElementById('f_hpsekretaris').value
            };
            newData[type] = wilayah; // set .kecamatan or .kelurahan
        }

        if(editId) {
            // Update
            const idx = db[type].findIndex(i => i.id === editId);
            db[type][idx] = newData;
            pushToSpreadsheet('update', type, newData); // Sync to GS
            showNotification(`Data ${type} berhasil diupdate!`);
        } else {
            // Add
            db[type].push(newData);
            pushToSpreadsheet('insert', type, newData); // Sync to GS
            showNotification(`Data ${type} berhasil ditambahkan!`);
        }

        saveLocalDb();
        closeForm();
        renderContent();
    }

    window.editData = function(type, id) {
        openForm(type, id);
    }

    // --- VIEW MODAL ---
    window.viewDetail = function(type, id) {
        const modal = document.getElementById('view-modal');
        const body = document.getElementById('view-body');
        const data = db[type].find(i => i.id === id);
        
        let html = '';
        if(type === 'anggota') {
            html = `
                <div class="text-center mb-4">
                    <div class="w-20 h-20 bg-teal-100 rounded-full mx-auto flex items-center justify-center text-teal-600 text-3xl mb-2"><i class="fa-solid fa-user"></i></div>
                    <h2 class="text-xl font-bold">${data.nama || '-'}</h2>
                    <p class="text-gray-500">${data.id}</p>
                </div>
                <table class="w-full text-sm">
                    <tr class="border-b"><td class="py-2 text-gray-500 w-1/3">Jabatan</td><td class="py-2 font-medium">${data.jabatan || '-'}</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Tanggal Lahir</td><td class="py-2 font-medium">${formatDateIndo(data.tglLahir)} (${calculateAge(data.tglLahir)} thn)</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Agama</td><td class="py-2 font-medium">${data.agama || '-'}</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Status</td><td class="py-2 font-medium"><span class="bg-teal-100 text-teal-800 px-2 py-0.5 rounded text-xs">${data.status || '-'}</span></td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Warta</td><td class="py-2 font-medium">${data.warta || '-'}</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">No. HP</td><td class="py-2 font-medium">${data.hp || '-'}</td></tr>
                    <tr><td class="py-2 text-gray-500 align-top">Alamat</td><td class="py-2 font-medium">${data.alamat || '-'}</td></tr>
                </table>
            `;
        } else {
            const ketua = db.anggota.find(a => a.id === data.ketuaPkkId);
            const warta = ketua ? ketua.warta : '-';
            const namaKetua = ketua ? ketua.nama : '-';
            const wLabel = type === 'kecamatan' ? 'Kecamatan' : 'Kelurahan';

            html = `
                <div class="text-center mb-4">
                    <div class="w-16 h-16 bg-blue-100 rounded-full mx-auto flex items-center justify-center text-blue-600 text-2xl mb-2"><i class="fa-solid fa-building"></i></div>
                    <h2 class="text-xl font-bold">${data[type] || '-'}</h2>
                    <p class="text-gray-500">ID: ${data.id}</p>
                </div>
                <table class="w-full text-sm">
                    <tr class="border-b"><td class="py-2 text-gray-500 w-2/5">Pejabat ${wLabel}</td><td class="py-2 font-medium">${data.namaPejabat || '-'} (${data.lp || '-'})</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Ketua TP PKK</td><td class="py-2 font-medium text-teal-600">${namaKetua}</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Warta</td><td class="py-2 font-medium">${warta}</td></tr>
                    <tr class="border-b"><td class="py-2 text-gray-500">Sekretaris</td><td class="py-2 font-medium">${data.sekretaris || '-'}</td></tr>
                    <tr><td class="py-2 text-gray-500">HP Sekretaris</td><td class="py-2 font-medium">${data.hpSekretaris || '-'}</td></tr>
                </table>
            `;
        }
        
        body.innerHTML = html;
        modal.classList.add('active');
    }

    function closeViewModal() {
        document.getElementById('view-modal').classList.remove('active');
    }

    // --- SETTINGS ---
    function openSettings() {
        document.getElementById('setting-url').value = webAppUrl;
        document.getElementById('settings-modal').classList.add('active');
    }

    function closeSettings() {
        document.getElementById('settings-modal').classList.remove('active');
    }

    function saveSettings() {
        webAppUrl = document.getElementById('setting-url').value;
        localStorage.setItem('epkk_url', webAppUrl);
        updateSyncStatus();
        closeSettings();
        
        if(webAppUrl) {
            showNotification("URL berhasil disimpan. Mensinkronisasikan data...");
            syncData(); // Langsung otomatis tersinkron setelah klik simpan url
        }
    }

    // INIT
    window.onload = () => {
        initMockData();
        renderContent();
        // Langsung mengambil data jika link GS ada
        if(webAppUrl) {
            syncData();
        }
    };

</script>
</body>
</html>
